<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumSpark Pro - AI Trading Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        quantumPurple: {
                            light: '#a855f7',
                            DEFAULT: '#7c3aed',
                            dark: '#5b21b6',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col">
    <header class="bg-gray-800 p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-quantumPurple-light to-quantumPurple-dark">QuantumSpark Pro</h1>
            <nav>
                <ul class="flex space-x-4">
                    <li><a href="#" class="text-gray-300 hover:text-quantumPurple transition-colors">Dashboard</a></li>
                    <li><a href="#" class="text-gray-300 hover:text-quantumPurple transition-colors">Backtesting</a></li>
                    <li><a href="#" class="text-gray-300 hover:text-quantumPurple transition-colors">Account</a></li>
                    <li><button id="logout-btn" class="bg-quantumPurple hover:bg-quantumPurple-dark text-white font-bold py-2 px-4 rounded transition-colors">Logout</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-6 flex-grow">
        <h2 class="text-4xl font-bold text-white mb-8">Live Dashboard</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
                <h3 class="text-xl font-semibold text-white mb-4">Live Ticker</h3>
                <div id="live-ticker" class="space-y-2"></div>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg col-span-2">
                <h3 class="text-xl font-semibold text-white mb-4">Price Chart (BTC/USD)</h3>
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg shadow-lg mb-8">
            <h3 class="text-xl font-semibold text-white mb-4">AI Signal Feed</h3>
            <div id="signal-feed" class="space-y-4"></div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
            <h3 class="text-xl font-semibold text-white mb-4">Backtesting Results (Enterprise Only)</h3>
            <div id="backtesting-results"></div>
        </div>
    </main>

    <footer class="bg-gray-800 p-4 text-center text-gray-500">
        <p>&copy; 2026 QuantumSpark Pro. All rights reserved.</p>
    </footer>

    <script src="./dashboard.js"></script>
</body>
</html>
