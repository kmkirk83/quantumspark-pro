<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumSpark Pro - AI Trading Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        quantumPurple: {
                            light: '#a855f7',
                            DEFAULT: '#7c3aed',
                            dark: '#5b21b6',
                        },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="min-h-screen flex flex-col items-center justify-center">
        <h1 class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-quantumPurple-light to-quantumPurple-dark mb-6">QuantumSpark Pro</h1>
        <p class="text-2xl text-gray-400 mb-8">Next-Gen AI-Powered Trading Insights</p>
        <div class="animate-pulse flex space-x-4">
            <div class="rounded-full bg-quantumPurple h-12 w-12"></div>
            <div class="flex-1 space-y-4 py-1">
                <div class="h-4 bg-quantumPurple rounded w-3/4"></div>
                <div class="space-y-2">
                    <div class="h-4 bg-quantumPurple rounded"></div>
                    <div class="h-4 bg-quantumPurple rounded w-5/6"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
